<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
	src="https://cdn.jsdelivr.net/gh/xTracky/static@latest/utm-handler.js"
	data-token="89ef03cd-5b9a-4eea-9ab0-cd43faa8b91e"
>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<script>
// ==========================================
// CAPTURA DE PARÂMETROS - VERSÃO FINAL
// ==========================================

function getCampaignName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // Prioridade para sck (como estava funcionando)
  let sck = urlParams.get('sck');
  if (sck && sck !== '' && !sck.startsWith('__')) {
    let cleaned = sck.substring(0, 40).replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('✅ Campanha via sck:', cleaned);
    return cleaned;
  }
  
  // Fallback: outros parâmetros
  let cname = urlParams.get('cname');
  if (cname && cname !== '') return cname;
  
  let campaignId = urlParams.get('CampaignID');
  if (campaignId && campaignId !== '') return campaignId;
  
  let utmCampaign = urlParams.get('utm_campaign');
  if (utmCampaign && utmCampaign !== '') return utmCampaign;
  
  console.log('⚠️ Campanha fallback: organico');
  return 'organico';
}

function getCreativeName() {
  const urlParams = new URLSearchParams(window.location.search);
  
  // PRIORIDADE 1: adname (nome do criativo)
  let adname = urlParams.get('adname');
  if (adname && adname !== '' && !adname.startsWith('__')) {
    let cleaned = adname.substring(0, 40).replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('✅ Criativo via adname:', cleaned);
    return cleaned;
  }
  
  // PRIORIDADE 2: CreativeID
  let creativeId = urlParams.get('CreativeID');
  if (creativeId && creativeId !== '' && !creativeId.startsWith('__')) {
    let cleaned = creativeId.substring(0, 40).replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('✅ Criativo via CreativeID:', cleaned);
    return cleaned;
  }
  
  // PRIORIDADE 3: click_id
  let clickId = urlParams.get('click_id');
  if (clickId && clickId !== '' && !clickId.startsWith('__')) {
    let cleaned = clickId.substring(0, 40).replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('✅ Criativo via click_id:', cleaned);
    return cleaned;
  }
  
  // PRIORIDADE 4: utm_content
  let utmContent = urlParams.get('utm_content');
  if (utmContent && utmContent !== '') {
    let cleaned = utmContent.substring(0, 40).replace(/[^a-zA-Z0-9_\-]/g, '_');
    console.log('✅ Criativo via utm_content:', cleaned);
    return cleaned;
  }
  
  // FALLBACK: usar o final do sck (se existir)
  let sck = urlParams.get('sck');
  if (sck && sck !== '') {
    let partes = sck.split('-');
    let ultimaParte = partes[partes.length - 1];
    if (ultimaParte && ultimaParte.length > 5) {
      let cleaned = ultimaParte.substring(0, 30).replace(/[^a-zA-Z0-9_\-]/g, '_');
      console.log('⚠️ Criativo fallback (via sck):', cleaned);
      return cleaned;
    }
  }
  
  console.log('⚠️ Criativo fallback: desconhecido');
  return 'desconhecido';
}

function buildTelegramUrl() {
  const campaignName = getCampaignName();
  const creativeName = getCreativeName();
  
  const baseUrl = "https://t.me/DaarkVazados1_bot";
  const url = new URL(baseUrl);
  
  url.searchParams.set('start', creativeName);
  
  console.log('🔗 URL FINAL:', url.toString());
  console.log('📌 CAMPANHA:', campaignName);
  console.log('📌 CÓDIGO VENDAS (start):', creativeName);
  
  return url.toString();
}

function updateButtonLink() {
  const button = document.querySelector('.button');
  if (button) {
    button.href = buildTelegramUrl();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateButtonLink();
  
  const button = document.querySelector('.button');
  if (button) {
    button.addEventListener('click', function(e) {
      this.href = buildTelegramUrl();
    });
  }
});

console.log('🚀 Página carregada');
console.log('📋 URL:', window.location.href);
console.log('📊 PARÂMETROS NA URL:');
new URLSearchParams(window.location.search).forEach((value, key) => {
  console.log(`   ${key} = ${value}`);
});
</script>

</body>
