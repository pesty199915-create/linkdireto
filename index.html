<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Acesso Exclusivo 📸🤳🏻</title>

<!-- Pressel - Captura e repassa todos os parâmetros UTM -->
<script>
(function() {
    // Captura todos os parâmetros da URL
    var urlParams = new URLSearchParams(window.location.search);
    
    // ===== LISTA COMPLETA DE PARÂMETROS =====
    var paramKeys = [
        'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'utm_id',
        'adname', 'ad_name', 'creative', 'creative_name', 'kwai_ad', 'kwai_creative',
        'fbclid', 'gclid', 'click_id', 'kwai_click_id', 'msclkid', 'ttclid', '_fbp', '_fbc',
        'kwai_id', 'kwai_campaign', 'kwai_adset', 'kwai_ad',
        'sck', 'xcod', 'cv', 'salesCode', 'source', 'medium', 'campaign', 'content', 'term', 'apx', 'pixel_id'
    ];
    
    var capturedParams = {};
    var hasParams = false;
    
    // Captura todos os parâmetros da lista
    paramKeys.forEach(function(key) {
        var value = urlParams.get(key);
        if (value) {
            capturedParams[key] = value;
            hasParams = true;
        }
    });
    
    // ===== PRESERVA O ID ORIGINAL E ADICIONA NOME LEGÍVEL =====
    var utmContentOriginal = capturedParams.utm_content || '';
    var adName = capturedParams.adname || capturedParams.ad_name || capturedParams.creative || '';
    
    // Extrai o ID do criativo do utm_content (primeira parte antes do ::)
    var criativoID = utmContentOriginal.split('::')[0] || utmContentOriginal;
    
    // ===== CRIA O CAMPO creative_name COM O NOME LEGÍVEL =====
    var nomeCriativo = '';
    
    if (adName && adName.length > 0 && adName.length < 200) {
        nomeCriativo = adName;
    } else if (criativoID && criativoID.length > 0 && criativoID !== utmContentOriginal) {
        // Se tem ID mas não tem nome, tenta usar o ID como nome
        nomeCriativo = 'Criativo ID: ' + criativoID;
    } else if (utmContentOriginal && !utmContentOriginal.includes('::')) {
        nomeCriativo = utmContentOriginal;
    }
    
    // ===== MANTÉM O utm_content ORIGINAL (com ID) =====
    // Não substitui o utm_content, mantém o original
    
    // ===== ADICIONA O NOME EM UM CAMPO SEPARADO =====
    if (nomeCriativo) {
        // Adiciona como creative_name (campo que o server.js reconhece)
        capturedParams.creative_name = nomeCriativo;
        capturedParams.adname = nomeCriativo;
        
        // Também adiciona como utm_term se estiver vazio
        if (!capturedParams.utm_term || capturedParams.utm_term === '') {
            capturedParams.utm_term = nomeCriativo;
        }
        
        console.log('🎯 ID original: ' + criativoID);
        console.log('🎯 Nome do criativo: ' + nomeCriativo);
        hasParams = true;
    }
    
    // Extrai pixel_id e click_id do utm_content original (se disponível)
    if (utmContentOriginal && utmContentOriginal.includes('::')) {
        var parts = utmContentOriginal.split('::');
        if (parts.length === 3) {
            if (!capturedParams.pixel_id) {
                capturedParams.pixel_id = parts[2];
                hasParams = true;
            }
            if (!capturedParams.click_id && !capturedParams.kwai_click_id) {
                capturedParams.click_id = parts[1];
                hasParams = true;
            }
        }
    }
    
    // Salva no sessionStorage
    try {
        var existing = JSON.parse(sessionStorage.getItem('pressel_utms') || '{}');
        Object.keys(capturedParams).forEach(function(key) {
            existing[key] = capturedParams[key];
        });
        sessionStorage.setItem('pressel_utms', JSON.stringify(existing));
        capturedParams = existing;
    } catch(e) {}
    
    // Função para construir URL com parâmetros
    function buildRedirectUrl(baseUrl) {
        try {
            var url = new URL(baseUrl);
            Object.keys(capturedParams).forEach(function(key) {
                if (!url.searchParams.has(key)) {
                    url.searchParams.set(key, capturedParams[key]);
                }
            });
            return url.toString();
        } catch(e) {
            return baseUrl;
        }
    }
    
    var DESTINATION_URL = 'https://apextry.com/go/pest';
    
    if (hasParams) {
        console.log('📊 Parâmetros capturados pela Pressel:', capturedParams);
        var finalUrl = buildRedirectUrl(DESTINATION_URL);
        console.log('🔗 URL que será usada no clique:', finalUrl);
    }
    
    function redirectWithParams() {
        var currentUrl = buildRedirectUrl(DESTINATION_URL);
        window.location.href = currentUrl;
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.querySelector('.button');
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                redirectWithParams();
            });
        }
    });
    
    if (document.readyState !== 'loading') {
        var btn = document.querySelector('.button');
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                redirectWithParams();
            });
        }
    }
})();
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: radial-gradient(circle at center top, rgb(26, 26, 26), rgb(13, 13, 13) 70%);
        font-family: Arial, Helvetica, sans-serif;
        color: rgb(255, 255, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .wrapper {
        max-width: 480px;
        width: 100%;
        padding: 40px 25px;
        text-align: center;
        background: rgba(20, 20, 20, 0.95);
        border-radius: 16px;
        box-shadow: rgba(0, 136, 204, 0.3) 0px 0px 40px;
    }

    .telegram-logo {
        width: 70px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 26px;
        margin-bottom: 15px;
        color: rgb(0, 136, 204);
    }

    .sub {
        font-size: 15px;
        color: rgb(204, 204, 204);
        margin-bottom: 25px;
        line-height: 1.6;
    }

    .features {
        text-align: left;
        margin-bottom: 25px;
    }

    .features p {
        margin-bottom: 8px;
        font-size: 14px;
        color: rgb(221, 221, 221);
    }

    .button {
        display: block;
        width: 100%;
        padding: 18px;
        background: linear-gradient(90deg, rgb(0, 136, 204), rgb(0, 170, 255));
        border-radius: 12px;
        text-decoration: none;
        color: rgb(255, 255, 255);
        font-weight: bold;
        font-size: 17px;
        transition: 0.3s;
        text-align: center;
        cursor: pointer;
        border: none;
    }

    .button:hover {
        transform: scale(1.03);
        box-shadow: rgba(0, 136, 204, 0.6) 0px 0px 20px;
    }

    .footer {
        font-size: 12px;
        color: rgb(102, 102, 102);
        margin-top: 20px;
    }
</style>

</head>
<body>

<div class="wrapper">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="telegram-logo" alt="Telegram Logo" width="70" height="70">

    <h1>Acesso Direto 🔒</h1>

    <p class="sub">
        Clique no botão abaixo para acessar o conteúdo exclusivo.
    </p>

    <div class="features">
        <p>🔞 Conteúdos exclusivos</p>
        <p>💬 Acesso rápido e seguro</p>
        <p>🎥 Atualizações frequentes</p>
        <p>⚠️ Disponibilidade limitada</p>
    </div>

    <a href="#" class="button" id="btnAcesso">
        ACESSAR CONTEÚDO AGORA
    </a>

    <div class="footer">
        Clique no botão para ser redirecionado.
    </div>
</div>

</body>
</html>
